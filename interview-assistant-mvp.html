<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <title>产品经理面试助手 MVP</title>
  <style>
    :root{--bg:#f6f8fb;--panel:#fff;--soft:#f9fbfe;--line:#dbe4ef;--text:#1f2937;--muted:#64748b;--blue:#2563eb;--blue2:#eef5ff;--green:#11835b;--green2:#eaf8f2;--red:#b42318;--red2:#fff0ed;--shadow:0 16px 36px rgba(31,41,55,.08);font-family:"Microsoft YaHei","PingFang SC","Segoe UI",Arial,sans-serif;color:var(--text);background:var(--bg)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(180deg,rgba(37,99,235,.07),rgba(246,248,251,0) 220px),var(--bg);letter-spacing:0} button,input,select,textarea{font:inherit} button{border:0;border-radius:7px;min-height:38px;padding:0 14px;cursor:pointer;background:#edf2f7;color:var(--text)} button:hover{box-shadow:0 6px 14px rgba(31,41,55,.08)} button.primary{background:var(--blue);color:#fff} button.ghost{background:#fff;border:1px solid var(--line)} button.danger{background:var(--red2);color:var(--red)} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--text);outline:none} input,select{height:38px;padding:0 11px} textarea{min-height:126px;padding:11px;line-height:1.55;resize:vertical} input:focus,select:focus,textarea:focus{border-color:#8eb5ff;box-shadow:0 0 0 3px rgba(37,99,235,.12)} label{display:block;margin:0 0 7px;color:var(--muted);font-size:13px;font-weight:700}
    .app{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}.side{display:flex;flex-direction:column;gap:22px;padding:22px 18px;border-right:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(14px)}.brand{display:flex;gap:12px;align-items:center}.mark{display:grid;place-items:center;width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#11835b);color:#fff;font-weight:800}.brand h1{font-size:18px;margin:0}.brand small{color:var(--muted)}.nav{display:grid;gap:6px}.tab{display:flex;align-items:center;gap:10px;justify-content:flex-start;background:transparent;color:var(--muted);box-shadow:none}.tab:hover{background:#edf4fc;box-shadow:none}.tab.active{background:var(--blue2);color:var(--blue);font-weight:800}.dot{display:grid;place-items:center;width:24px;height:24px;border-radius:7px;background:rgba(37,99,235,.08);font-size:12px}.sideStats{display:grid;gap:10px;margin-top:auto}.stat{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff}.stat span{color:var(--muted);font-size:12px}.stat b{font-size:19px}.main{display:grid;grid-template-rows:auto minmax(0,1fr);min-width:0}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;min-height:74px;padding:18px 28px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.78);backdrop-filter:blur(12px)}.top h2{margin:0;font-size:clamp(20px,2.5vw,28px)}.pills{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}.pill{display:inline-flex;align-items:center;min-height:28px;padding:0 9px;border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);font-size:12px;white-space:nowrap}.pill.blue{background:var(--blue2);border-color:#c7dcff;color:#174ea6}.pill.green{background:var(--green2);border-color:#bce8d4;color:var(--green)}.content{padding:24px 28px 34px;overflow:auto}.view{display:none;max-width:1260px;margin:0 auto}.view.active{display:block}.grid{display:grid;gap:16px}.two{grid-template-columns:minmax(300px,.88fr) minmax(360px,1.12fr);align-items:start}.surface{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow);overflow:hidden}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 17px;border-bottom:1px solid var(--line);background:var(--soft)}.head h3{margin:0;font-size:16px}.body{padding:17px}.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.toggle{display:flex;align-items:center;gap:8px;width:auto;min-height:38px;padding:0 10px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer}.toggle input{width:16px;height:16px;accent-color:var(--blue)}.list{display:grid;gap:10px;max-height:535px;overflow:auto;padding-right:4px}.item,.source,.weak{display:grid;gap:8px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff}.item strong,.source strong,.weak strong{font-size:14px;line-height:1.35}.muted{color:var(--muted);font-size:13px;line-height:1.5}.meta{display:flex;flex-wrap:wrap;gap:6px;color:var(--muted);font-size:12px}.tag{display:inline-flex;align-items:center;min-height:22px;padding:0 7px;border-radius:999px;background:#edf2f7;color:var(--muted);font-size:12px}.empty{display:grid;place-items:center;min-height:160px;padding:22px;border:1px dashed #b7c5d6;border-radius:8px;background:#fff;color:var(--muted);text-align:center}.chat{display:grid;grid-template-rows:auto minmax(360px,1fr) auto;min-height:650px}.settings{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;padding:14px;border-bottom:1px solid var(--line)}.stream{display:grid;align-content:start;gap:14px;padding:18px;overflow:auto;background:linear-gradient(180deg,#fff,#f8fbff)}.msg{display:grid;gap:8px;max-width:min(780px,100%);padding:13px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;line-height:1.6;white-space:pre-wrap}.msg.user{justify-self:end;background:var(--blue2);border-color:#c7dcff;color:#123a75}.msg.system{justify-self:center;background:#f1f5f9;color:var(--muted)}.msg small{font-weight:800;color:var(--muted)}.composer{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;padding:14px;border-top:1px solid var(--line);background:var(--soft)}.composer textarea{min-height:64px}.interview{display:grid;grid-template-columns:minmax(320px,.78fr) minmax(420px,1.22fr);gap:16px;align-items:start}.qbox{display:grid;gap:12px;padding:16px;border:1px solid #c7dcff;border-radius:8px;background:var(--blue2)}.qbox h3{margin:0;font-size:18px;line-height:1.45}.score{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff}.num{display:grid;place-items:center;width:58px;height:58px;border-radius:8px;background:var(--green);color:#fff;font-size:20px;font-weight:800}.bar{height:8px;border-radius:999px;background:#e5eaf1;overflow:hidden}.bar span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),var(--green))}.feedback{display:grid;gap:8px;margin:0;padding:0;list-style:none}.feedback li{padding:10px 11px;border-radius:7px;background:#f6f8fb;line-height:1.5}.insights{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.insight{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;min-height:112px}.insight span{display:block;color:var(--muted);font-size:12px;font-weight:800}.insight b{display:block;margin-top:8px;font-size:28px}.insight small{display:block;margin-top:10px;color:var(--muted);line-height:1.35}.review{display:grid;grid-template-columns:minmax(320px,.9fr) minmax(380px,1.1fr);gap:16px;margin-top:16px}.toast{position:fixed;left:50%;bottom:24px;z-index:20;transform:translateX(-50%);max-width:min(520px,calc(100vw - 32px));padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:#fff;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
    @media(max-width:1040px){.app{grid-template-columns:1fr}.side{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:auto minmax(0,1fr);padding:12px;border-right:0;border-bottom:1px solid var(--line)}.nav{grid-template-columns:repeat(4,1fr)}.sideStats{display:none}.tab{justify-content:center}.dot{display:none}.two,.interview,.review{grid-template-columns:1fr}.settings,.insights{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:720px){.top{align-items:flex-start;flex-direction:column;padding:16px}.content{padding:16px}.brand small{display:none}.nav{grid-template-columns:repeat(2,1fr)}.form,.settings,.insights{grid-template-columns:1fr}.composer{grid-template-columns:1fr}.chat{min-height:560px}}
  </style>
</head>
<body>
  <div class="app"><aside class="side"><div class="brand"><div class="mark">PM</div><div><h1>面试助手</h1><small>个人题库陪练</small></div></div><nav class="nav"><button class="tab active" data-view="library"><span class="dot">1</span>资料库</button><button class="tab" data-view="qa"><span class="dot">2</span>问答</button><button class="tab" data-view="interview"><span class="dot">3</span>模拟面试</button><button class="tab" data-view="review"><span class="dot">4</span>复盘</button></nav><div class="sideStats"><div class="stat"><span>资料</span><b id="sideDocs">0</b></div><div class="stat"><span>练习</span><b id="sideRuns">0</b></div><div class="stat"><span>均分</span><b id="sideAvg">0</b></div></div></aside><main class="main"><header class="top"><h2 id="title">资料库</h2><div class="pills"><span class="pill blue" id="chunkPill">0 个知识片段</span><span class="pill green">本地保存</span></div></header><section class="content"><div class="view active" id="view-library"><div class="grid two"><section class="surface"><div class="head"><h3>导入资料</h3><button class="ghost" id="sampleBtn">载入示例</button></div><div class="body"><div class="form"><div><label for="docTitle">标题</label><input id="docTitle" placeholder="例如：会员增长项目复盘"></div><div><label for="docTags">标签</label><input id="docTags" placeholder="项目, 增长, B端"></div><div class="full"><label for="docText">内容</label><textarea id="docText" placeholder="粘贴面试题、项目经历、岗位 JD、面经或复盘笔记"></textarea></div><div class="full row"><button class="primary" id="addDoc">加入资料库</button><label class="toggle"><input id="fileInput" type="file" accept=".txt,.md,.csv,.json" multiple>上传文本文件</label></div></div></div></section><section class="surface"><div class="head"><h3>我的资料</h3><button class="danger" id="clearDocs">清空资料</button></div><div class="body"><div class="list" id="docList"></div></div></section></div></div><div class="view" id="view-qa"><section class="surface chat"><div class="settings"><div><label for="answerMode">回答风格</label><select id="answerMode"><option value="interview">面试表达</option><option value="coach">教练反馈</option><option value="concise">简洁要点</option></select></div><div><label for="scope">检索范围</label><select id="scope"><option value="all">全部资料</option><option value="project">项目相关</option><option value="question">题库相关</option></select></div><div><label for="topK">参考数量</label><select id="topK"><option>3</option><option>5</option><option>8</option></select></div><label class="toggle"><input id="strict" type="checkbox" checked>严格基于资料</label></div><div class="stream" id="chatStream"></div><div class="composer"><textarea id="question" placeholder="例如：面试官问我如何判断一个需求是否值得做，我应该怎么答？"></textarea><button class="primary" id="ask">发送</button></div></section></div><div class="view" id="view-interview"><div class="interview"><section class="surface"><div class="head"><h3>面试设置</h3></div><div class="body"><div class="form"><div><label for="mode">场景</label><select id="mode"><option value="project">项目深挖</option><option value="product">产品设计</option><option value="data">数据分析</option><option value="business">业务理解</option><option value="pressure">压力面试</option></select></div><div><label for="level">难度</label><select id="level"><option value="junior">初级</option><option value="middle" selected>中级</option><option value="senior">高级</option></select></div><div class="full"><label for="role">目标岗位</label><input id="role" placeholder="例如：增长产品经理、B端产品经理"></div><div class="full row"><button class="primary" id="start">开始一轮面试</button><button class="ghost" id="next">换一道题</button></div></div></div></section><section class="surface"><div class="head"><h3>面试现场</h3><span class="pill" id="round">未开始</span></div><div class="body grid"><div class="qbox"><span class="pill blue" id="qType">面试官</span><h3 id="currentQ">点击开始后，这里会出现第一道题。</h3></div><div><label for="answer">你的回答</label><textarea id="answer" placeholder="像真实面试一样作答"></textarea></div><div class="row"><button class="primary" id="submit">提交回答</button><button class="ghost" id="copyBetter">复制优化版</button></div><div class="grid" id="feedback"></div></div></section></div></div><div class="view" id="view-review"><div class="insights"><div class="insight"><span>资料数量</span><b id="rDocs">0</b><small>个人题库、项目、JD、面经</small></div><div class="insight"><span>知识片段</span><b id="rChunks">0</b><small>用于问答和追问检索</small></div><div class="insight"><span>练习次数</span><b id="rRuns">0</b><small>已完成的面试作答</small></div><div class="insight"><span>平均分</span><b id="rAvg">0</b><small>按结构、数据、用户意识等维度</small></div></div><div class="review"><section class="surface"><div class="head"><h3>薄弱点</h3></div><div class="body"><div class="grid" id="weakList"></div></div></section><section class="surface"><div class="head"><h3>练习记录</h3><button class="danger" id="clearHistory">清空记录</button></div><div class="body"><div class="list" id="history"></div></div></section></div></div></section></main></div><div class="toast" id="toast"></div>
  <script>
    var KEY='pmInterviewAssistantMvp';var S={docs:[],chunks:[],chat:[],history:[],current:null,lastBetter:''};function byId(id){return document.getElementById(id)}var E={};['sideDocs','sideRuns','sideAvg','title','chunkPill','docTitle','docTags','docText','sampleBtn','addDoc','fileInput','clearDocs','docList','answerMode','scope','topK','strict','chatStream','question','ask','mode','level','role','start','next','round','qType','currentQ','answer','submit','copyBetter','feedback','rDocs','rChunks','rRuns','rAvg','weakList','history','clearHistory','toast'].forEach(function(id){E[id]=byId(id)});var page={library:'资料库',qa:'问答助手',interview:'模拟面试',review:'复盘中心'};var kws=['需求','用户','场景','痛点','价值','优先级','MVP','指标','数据','转化','留存','增长','商业化','会员','漏斗','北极星指标','复盘','项目','竞品','调研','访谈','画像','B端','C端','SaaS','协作','研发','排期','风险','上线','AB测试','A/B','DAU','MAU','GMV','ROI','LTV','CAC','产品设计'];
    var samples=[{title:'增长产品经理项目复盘',tags:['项目','增长','数据'],text:'项目背景：某求职社区的新用户注册后 7 日留存偏低，核心问题是用户不知道下一步该做什么。目标：提升新用户 7 日留存和简历完善率。\n\n我的职责：我负责用户路径分析、需求优先级判断、方案设计和上线复盘。通过漏斗分析发现，用户在注册后第一次完善简历的转化率只有 28%，访谈发现用户对简历质量缺乏判断。\n\n方案：设计新手任务、简历评分、岗位匹配提醒三个能力。优先级上，先做简历评分，因为它能直接解决用户不确定感，研发成本也低于完整岗位推荐。\n\n结果：上线两周后，简历完善率从 28% 提升到 41%，7 日留存提升 6.3 个百分点。复盘：后续还需要区分应届生和社招用户路径。'},{title:'产品经理高频题：需求优先级',tags:['题库','需求','优先级'],text:'问题：如何判断一个需求是否值得做？\n\n回答结构：先明确业务目标，再判断用户价值、商业价值、实现成本、风险和时机。常用方法包括 RICE、KANO、ROI 评估，但面试中不要只背模型，要结合真实项目说明如何取舍。\n\n表达要点：需求不是谁声音大就做，而是看它是否服务当前目标。可以从目标相关性、影响用户规模、问题严重度、数据证据、实现成本、机会窗口几个维度排序。最后要说明上线后的验证指标。'},{title:'B 端产品经理面试题',tags:['题库','B端','协作'],text:'问题：B 端产品如何处理客户定制化需求？\n\n回答结构：首先判断需求背后的真实场景，再区分个性化诉求和共性问题。对于共性需求，可以沉淀为标准能力；对于个性化需求，要评估客户价值、交付成本、维护成本和对产品主线的影响。\n\n协作重点：需要和销售、实施、研发对齐边界。不能简单答应客户，也不能只说不做。好的做法是给出短期替代方案和长期产品化路径。'},{title:'数据分析题：DAU 下降',tags:['题库','数据','指标'],text:'问题：DAU 下降你会怎么分析？\n\n回答结构：先确认数据口径和下降范围，再拆分新增、留存、召回三个来源。进一步按渠道、版本、地域、用户类型、核心路径转化进行定位。最后结合产品变更、运营活动、竞品和外部环境验证假设。\n\n不要只说看数据，要说明如何形成假设、如何验证、如何给出动作。例如如果新用户 DAU 下降，优先看渠道质量和注册转化；如果老用户下降，重点看核心功能使用频次、消息触达和近期版本体验。'}];
    var banks={project:['请介绍一个你最能体现产品能力的项目，并说明你的个人贡献。','这个项目的目标是什么？你当时如何判断它值得做？','项目推进过程中最大的阻力是什么？你如何协调资源？'],product:['请设计一个面向应届生的面试备考工具，你会如何定义 MVP？','如果要提升一个求职产品的次日留存，你会怎么拆解问题？','你如何判断一个新功能应该做成独立入口还是嵌入现有流程？'],data:['如果一个产品的 DAU 连续两周下降，你会如何分析？','你会如何设计一个功能上线后的效果评估指标？','转化率下降时，你如何区分流量质量问题和产品体验问题？'],business:['你如何理解目标岗位所在业务的增长空间？','如果商业目标和用户体验发生冲突，你会如何权衡？','你会如何判断一个产品机会是否值得投入资源？'],pressure:['你刚才的回答比较泛，能不能给出更具体的数字和证据？','这件事听起来像团队成果，你个人不可替代的贡献是什么？','如果面试官认为这个项目价值不大，你会怎么回应？']};var rubric=[{n:'结构性',h:['背景','目标','问题','方案','结果','复盘','首先','其次','最后','第一','第二','第三']},{n:'数据意识',h:['%','提升','下降','DAU','MAU','GMV','转化','留存','漏斗','指标','A/B','AB','ROI','LTV','CAC']},{n:'用户意识',h:['用户','场景','痛点','需求','体验','访谈','调研','画像','反馈']},{n:'产品判断',h:['价值','成本','优先级','取舍','风险','资源','边界','验证','假设']},{n:'个人贡献',h:['我负责','我推动','我设计','我分析','我协调','我主导','我的判断']}];
    function newId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,8)}function save(){localStorage.setItem(KEY,JSON.stringify({docs:S.docs,chat:S.chat.slice(-30),history:S.history,current:S.current,lastBetter:S.lastBetter}))}function load(){try{var v=JSON.parse(localStorage.getItem(KEY)||'{}');S.docs=v.docs||[];S.chat=v.chat||[];S.history=v.history||[];S.current=v.current||null;S.lastBetter=v.lastBetter||''}catch(e){toast('本地数据读取失败。')}}function tags(v){return String(v||'').split(/[,，、\s]+/).map(function(x){return x.trim()}).filter(Boolean).slice(0,8)}function clip(t,n){n=n||120;t=String(t||'').replace(/\s+/g,' ').trim();return t.length>n?t.slice(0,n)+'...':t}function empty(t){var d=document.createElement('div');d.className='empty';d.textContent=t;return d}function toast(t){E.toast.textContent=t;E.toast.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(function(){E.toast.classList.remove('show')},2200)}function tok(text){var v=String(text||'').toLowerCase();var set=new Set();kws.forEach(function(k){if(v.indexOf(k.toLowerCase())>-1)set.add(k.toLowerCase())});(v.match(/[a-z0-9%/+-]{2,}/g)||[]).forEach(function(x){set.add(x)});(v.match(/[\u4e00-\u9fa5]{2,}/g)||[]).forEach(function(s){for(var i=0;i<s.length-1;i++)set.add(s.slice(i,i+2));for(i=0;i<s.length-2;i+=2)set.add(s.slice(i,i+3))});return Array.from(set)}
    function splitText(text){text=String(text||'').replace(/\r/g,'').replace(/\n{3,}/g,'\n\n').trim();if(!text)return[];var ps=text.split(/\n\s*\n|(?=问题[:：])|(?=Q[:：])/).map(function(x){return x.trim()}).filter(Boolean);var out=[],b='';ps.forEach(function(p){if((b+'\n\n'+p).length<=620)b=b?b+'\n\n'+p:p;else{if(b)out.push(b);if(p.length>760){for(var i=0;i<p.length;i+=520)out.push(p.slice(i,i+520));b=''}else b=p}});if(b)out.push(b);return out}function rebuild(){S.chunks=[];S.docs.forEach(function(d){splitText(d.text).forEach(function(text,i){S.chunks.push({id:d.id+'-'+i,docId:d.id,title:d.title,tags:d.tags||[],text:text,tokens:tok(d.title+' '+(d.tags||[]).join(' ')+' '+text)})})})}function retrieve(q,opt){opt=opt||{};var qt=tok(q),limit=Number(opt.limit||3),scope=opt.scope||'all';return S.chunks.filter(function(c){var s=c.title+' '+(c.tags||[]).join(' ')+' '+c.text;if(scope==='project')return /项目|经历|复盘|我负责|我主导|上线|结果/.test(s);if(scope==='question')return /问题|题库|面试|回答|如何|怎么/.test(s);return true}).map(function(c){var score=0;qt.forEach(function(t){if(c.tokens.indexOf(t)>-1)score+=t.length>2?3:1.2;if(c.title.toLowerCase().indexOf(t)>-1)score+=2.5;if((c.tags||[]).join(' ').toLowerCase().indexOf(t)>-1)score+=2});var copy=Object.assign({},c);copy.score=score;return copy}).filter(function(c){return c.score>0}).sort(function(a,b){return b.score-a.score}).slice(0,limit)}
    function category(t){if(/DAU|MAU|数据|指标|转化|留存|漏斗|下降|增长/.test(t))return'data';if(/项目|经历|负责|主导|贡献|复盘/.test(t))return'project';if(/需求|优先级|排期|价值|成本/.test(t))return'priority';if(/B端|客户|定制|SaaS|交付|销售/.test(t))return'b2b';if(/设计|功能|产品|方案|MVP/.test(t))return'design';if(/商业|收入|会员|付费|盈利|模式/.test(t))return'business';return'general'}function skeleton(c){return {data:'先确认口径，再拆分来源，接着提出假设和验证方式，最后给出产品动作和复盘指标。',project:'用背景、目标、动作、结果、复盘来讲，并明确你个人负责了什么决策。',priority:'先对齐业务目标，再看用户价值、商业价值、影响范围、实现成本、风险和验证指标。',b2b:'先还原客户场景，再区分共性和个性需求，评估客户价值、交付成本、维护成本和产品主线。',design:'先定义目标用户和核心场景，再拆需求、定 MVP、设计路径、补充指标和风险。',business:'先说明业务目标和关键假设，再分析用户价值、收入路径、成本结构和增长空间。',general:'先给结论，再给依据，补一个真实例子，最后说如何验证和复盘。'}[c]}function sentences(t){return String(t||'').replace(/\n+/g,'。').split(/[。！？!?；;]/).map(function(x){return x.trim()}).filter(Boolean)}function evidence(q,srcs){var qt=tok(q),arr=[];srcs.forEach(function(s){sentences(s.text).forEach(function(x){var sc=0;qt.forEach(function(t){if(x.toLowerCase().indexOf(t)>-1)sc+=t.length>2?3:1});if(/\d|%|提升|下降|结果|目标|负责/.test(x))sc+=1.5;arr.push({x:x,sc:sc})})});return Array.from(new Set(arr.filter(function(a){return a.x.length>=12}).sort(function(a,b){return b.sc-a.sc}).slice(0,5).map(function(a){return clip(a.x,120)})))}function follow(c){return {data:['你会优先看哪些指标？','如果数据无法证明你的假设，你会怎么办？','最后会推动哪些产品动作？'],project:['你的个人贡献是什么？','项目结果是否有量化指标？','如果重新做一次你会怎么改？'],priority:['如果老板坚持要做低优先级需求怎么办？','你如何和研发解释这个排序？','上线后用什么指标验证？'],b2b:['如何判断这是共性需求？','销售强烈要求定制时你怎么处理？','短期交付和长期产品化如何平衡？'],design:['MVP 里你会砍掉什么？','核心路径如何设计？','如何验证这个方案有效？'],business:['收入和体验冲突时怎么取舍？','关键风险是什么？','你会如何设计实验验证？'],general:['能不能给一个真实例子？','你的判断依据是什么？','如果结果不好你会怎么复盘？']}[c]}
    function practice(q,c,ev,mode){var mat=ev.length?ev.slice(0,3).join('；'):'我会结合目标、用户、数据和资源来判断';var open={data:'我会先避免直接下结论，而是把问题拆成数据口径、用户分层和关键路径三部分。',project:'我会用一个完整项目来说明我的产品判断和推进能力。',priority:'我不会只看谁提需求，而是先回到当前业务目标和用户问题。',b2b:'我会先判断这是不是客户背后的共性场景，而不是直接把它当成定制需求。',design:'我会先明确目标用户、核心场景和这次设计要解决的关键问题。',business:'我会先看这个机会是否同时满足用户价值和商业可持续性。',general:'我的回答会先给判断，再用依据和项目例子支撑。'}[c];var end=mode==='coach'?'这样回答既有方法论，也有具体证据，面试官更容易继续追问到你的真实能力。':'最后我会用指标验证结果，并在复盘中说明下一步优化方向。';return open+'结合我的资料，可以重点讲：'+mat+'。所以我会按照“目标是什么、问题在哪里、我做了什么、结果如何验证”的顺序展开。'+end}function makeAnswer(q,srcs,opt){var c=category(q);if(!srcs.length&&opt.strict)return '我在当前资料库里没有找到足够相关的依据。\n\n你可以补充：相关项目背景、目标指标、你负责的动作、上线结果、复盘结论。\n\n如果要准备这道题，可以先用这个骨架：'+skeleton(c);var ev=srcs.length?evidence(q,srcs):['当前资料较少，以下是通用产品经理面试表达框架。'];var f=follow(c),parts=[];if(opt.mode==='concise')parts=['可以这样答：',practice(q,c,ev,opt.mode),'','要点：'].concat(ev.map(function(x){return '- '+x}),['','追问：']).concat(f.map(function(x){return '- '+x}));else if(opt.mode==='coach')parts=['建议结构：',skeleton(c),'','可用素材：'].concat(ev.map(function(x){return '- '+x}),['','优化表达：',practice(q,c,ev,opt.mode),'','继续准备：']).concat(f.map(function(x){return '- '+x}));else parts=['面试表达版本：',practice(q,c,ev,opt.mode),'','回答逻辑：',skeleton(c),'','可能追问：'].concat(f.map(function(x){return '- '+x}));if(srcs.length){parts.push('','参考来源：');srcs.forEach(function(s,i){parts.push((i+1)+'. '+s.title+'：'+clip(s.text,90))})}return parts.join('\n')}
    function addDoc(){var text=E.docText.value.trim();if(!text)return toast('请先粘贴资料内容。');S.docs.push({id:newId(),title:E.docTitle.value.trim()||('未命名资料 '+(S.docs.length+1)),tags:tags(E.docTags.value),text:text,createdAt:Date.now()});E.docTitle.value='';E.docTags.value='';E.docText.value='';rebuild();save();render();toast('资料已加入。')}function handleFiles(ev){Array.from(ev.target.files||[]).forEach(function(file){if(!/\.(txt|md|csv|json)$/i.test(file.name)){toast('当前版本支持 txt、md、csv、json。PDF 和 Word 可先复制文本粘贴。');return}var r=new FileReader();r.onload=function(){var text=String(r.result||'').trim();if(text){S.docs.push({id:newId(),title:file.name.replace(/\.[^.]+$/,'')||'上传资料',tags:infer(text),text:text,createdAt:Date.now()});rebuild();save();render();toast('文件已加入。')}};r.readAsText(file,'utf-8')});ev.target.value=''}function infer(text){var out=[];kws.forEach(function(k){if(text.indexOf(k)>-1&&out.length<6)out.push(k)});return out.length?out:['资料']}function ask(){var q=E.question.value.trim();if(!q)return toast('请输入一个问题。');var opt={mode:E.answerMode.value,scope:E.scope.value,limit:Number(E.topK.value),strict:E.strict.checked};var src=retrieve(q,opt);S.chat.push({role:'user',text:q});S.chat.push({role:'assistant',text:makeAnswer(q,src,opt),sources:src});E.question.value='';save();renderChat()}
    function pick(){var m=E.mode.value,level=E.level.value,role=E.role.value.trim(),bank=banks[m]||banks.project;var base=bank[Math.floor(Math.random()*bank.length)];var fromDoc=questionFromDoc(m);if(fromDoc)base=fromDoc;var pre={junior:'',middle:'请稍微展开一点：',senior:'请结合业务目标、数据指标和资源取舍回答：'}[level];return {id:newId(),mode:m,level:level,text:pre+(role?('面向'+role+'，'):'')+base,createdAt:Date.now()}}function questionFromDoc(m){if(!S.chunks.length)return'';var pool=S.chunks.filter(function(c){var t=c.title+' '+c.text;if(m==='project')return /项目|我负责|我主导|结果|复盘/.test(t);if(m==='data')return /数据|指标|DAU|留存|转化|漏斗|提升|下降/.test(t);if(m==='business')return /商业|会员|收入|付费|ROI|增长/.test(t);if(m==='product')return /设计|需求|用户|场景|MVP|方案/.test(t);if(m==='pressure')return /项目|结果|贡献|指标|价值/.test(t);return true});var list=pool.length?pool:S.chunks;var c=list[Math.floor(Math.random()*list.length)],topic=clip(c.title,22);return {project:'你资料里提到“'+topic+'”，请说明这个项目的背景、目标、你的关键动作和最终结果。',data:'围绕“'+topic+'”，请说明你会如何定义指标，并判断方案是否有效。',business:'如果把“'+topic+'”放到业务目标里看，它的商业价值和风险是什么？',product:'基于“'+topic+'”，请讲讲你会如何拆解用户场景并设计 MVP。',pressure:'你提到“'+topic+'”，这件事中你个人不可替代的贡献是什么？请具体说明。'}[m]}function start(){S.current=pick();S.lastBetter='';E.answer.value='';renderQ();renderFeedback();save();toast('面试已开始。')}
    function evalAnswer(text){var details=rubric.map(function(r){var hit=0;r.h.forEach(function(h){if(text.indexOf(h)>-1)hit++});return {label:r.n,score:Math.max(35,Math.min(100,Math.round(hit/Math.max(3,r.h.length*.35)*100)))}});var len=text.length>=220?88:text.length>=120?72:text.length>=60?55:38;var bonus=/\d|%|提升|下降|上线|结果|负责|主导/.test(text)?6:0;var avg=details.reduce(function(s,x){return s+x.score},0)/details.length;var score=Math.max(35,Math.min(96,Math.round(avg*.72+len*.28+bonus)));var fb=[];if(len<60)fb.push('回答偏短，需要补充背景、动作和结果，避免只讲结论。');if(!/\d|%|提升|下降|DAU|转化|留存|指标/.test(text))fb.push('建议加入量化指标或验证方式，产品面试会更有说服力。');if(!/我负责|我推动|我主导|我设计|我分析|我的/.test(text))fb.push('需要更清楚地区分团队成果和你的个人贡献。');if(!/复盘|如果重新|不足|下一步|优化/.test(text))fb.push('可以补一句复盘，让面试官看到成长性。');if(!/用户|场景|痛点|需求|体验/.test(text))fb.push('建议把用户场景讲得更具体，避免只有内部视角。');if(!fb.length)fb.push('整体表达已经比较完整，下一步可以压缩语言，让重点更突出。');return {score:score,details:details,feedback:fb,weak:details.filter(function(x){return x.score<68}).map(function(x){return x.label})}}function better(q,ans,ev,srcs){var c=category(q),e=srcs.length?evidence(q,srcs).slice(0,2).join('；'):'',miss=ev.weak.length?'我会重点补强'+ev.weak.join('、')+'。':'我会进一步压缩表达，让重点更突出。';return ['针对这道题，我会先给出结论：'+skeleton(c),e?('结合资料中的信息，可以补充：'+e+'。'):'','然后用一个具体例子展开，说明背景、目标、我负责的动作和结果。'+miss,'最后我会补充上线后的验证指标和复盘：哪些判断被证明有效，哪些地方下一轮还需要优化。'].filter(Boolean).join('\n')}function submit(){if(!S.current)return toast('请先开始一轮面试。');var ans=E.answer.value.trim();if(!ans)return toast('请先填写你的回答。');var ev=evalAnswer(ans),srcs=retrieve(S.current.text+'\n'+ans,{limit:3,scope:'all'}),bt=better(S.current.text,ans,ev,srcs);S.lastBetter=bt;S.history.unshift({id:newId(),question:S.current.text,mode:S.current.mode,answer:ans,score:ev.score,details:ev.details,feedback:ev.feedback,better:bt,createdAt:Date.now()});save();renderFeedback({ev:ev,bt:bt,srcs:srcs});renderStats();toast('已生成反馈。')}
    function avg(){return S.history.length?Math.round(S.history.reduce(function(s,x){return s+Number(x.score||0)},0)/S.history.length):0}function renderStats(){E.sideDocs.textContent=S.docs.length;E.sideRuns.textContent=S.history.length;E.sideAvg.textContent=avg();E.chunkPill.textContent=S.chunks.length+' 个知识片段';E.rDocs.textContent=S.docs.length;E.rChunks.textContent=S.chunks.length;E.rRuns.textContent=S.history.length;E.rAvg.textContent=avg()}function renderDocs(){E.docList.innerHTML='';if(!S.docs.length){E.docList.append(empty('还没有资料。可以加入示例，或粘贴自己的项目经历、题库、JD。'));return}S.docs.forEach(function(d){var el=document.createElement('article');el.className='item';var title=document.createElement('strong');title.textContent=d.title;var meta=document.createElement('div');meta.className='meta';(d.tags||[]).forEach(function(t){var sp=document.createElement('span');sp.className='tag';sp.textContent=t;meta.append(sp)});var desc=document.createElement('div');desc.className='muted';desc.textContent=clip(d.text,120);var row=document.createElement('div');row.className='row';var askB=document.createElement('button');askB.className='ghost';askB.textContent='用它提问';askB.onclick=function(){switchView('qa');E.question.value='请基于《'+d.title+'》帮我准备面试表达。';E.question.focus()};var del=document.createElement('button');del.className='danger';del.textContent='删除';del.onclick=function(){S.docs=S.docs.filter(function(x){return x.id!==d.id});rebuild();save();render()};row.append(askB,del);el.append(title,meta,desc,row);E.docList.append(el)})}
    function renderChat(){E.chatStream.innerHTML='';if(!S.chat.length)S.chat.push({role:'system',text:'可以先在资料库加入简历、项目经历、面试题或岗位 JD，再开始提问。'});S.chat.forEach(function(m){var el=document.createElement('article');el.className='msg '+m.role;var sm=document.createElement('small');sm.textContent=m.role==='user'?'你':m.role==='assistant'?'面试助手':'系统';var body=document.createElement('div');body.textContent=m.text;el.append(sm,body);if(m.sources&&m.sources.length){var box=document.createElement('div');box.className='grid';m.sources.forEach(function(s){var d=document.createElement('div');d.className='source';var st=document.createElement('strong');st.textContent=s.title;var mt=document.createElement('div');mt.className='muted';mt.textContent=clip(s.text,130);d.append(st,mt);box.append(d)});el.append(box)}E.chatStream.append(el)});E.chatStream.scrollTop=E.chatStream.scrollHeight}function renderQ(){if(!S.current){E.round.textContent='未开始';E.qType.textContent='面试官';E.currentQ.textContent='点击开始后，这里会出现第一道题。';return}var map={project:'项目深挖',product:'产品设计',data:'数据分析',business:'业务理解',pressure:'压力面试'};E.round.textContent='进行中';E.qType.textContent=map[S.current.mode]||'面试官';E.currentQ.textContent=S.current.text}
    function renderFeedback(res){E.feedback.innerHTML='';if(!res){E.feedback.append(empty('提交回答后，这里会显示评分、建议和优化版。'));return}var label=res.ev.score>=85?'表达扎实':res.ev.score>=72?'基础可用':res.ev.score>=60?'需要补强':'先补框架';var sc=document.createElement('div');sc.className='score';var num=document.createElement('div');num.className='num';num.textContent=res.ev.score;var right=document.createElement('div');right.innerHTML='<strong>'+label+'</strong><div class="muted">重点看结构、数据、用户意识、产品判断和个人贡献。</div>';sc.append(num,right);E.feedback.append(sc);res.ev.details.forEach(function(x){var r=document.createElement('div');r.className='grid';r.style.gap='6px';var m=document.createElement('div');m.className='meta';m.innerHTML='<strong>'+x.label+'</strong><span>'+x.score+' 分</span>';var bar=document.createElement('div');bar.className='bar';var sp=document.createElement('span');sp.style.width=x.score+'%';bar.append(sp);r.append(m,bar);E.feedback.append(r)});var list=document.createElement('ul');list.className='feedback';res.ev.feedback.forEach(function(x){var li=document.createElement('li');li.textContent=x;list.append(li)});E.feedback.append(list);var box=document.createElement('div');box.className='msg';var small=document.createElement('small');small.textContent='优化版';var div=document.createElement('div');div.textContent=res.bt;box.append(small,div);E.feedback.append(box)}function advice(x){return {结构性:'练习用背景、目标、动作、结果、复盘来组织答案。',数据意识:'每个项目至少准备 2 到 3 个指标和一个验证方式。',用户意识:'把目标用户、关键场景、痛点和真实反馈讲清楚。',产品判断:'补充价值、成本、风险、优先级和取舍依据。',个人贡献:'明确你负责的判断、推动的动作和不可替代的贡献。'}[x]||'继续增加真实例子和复盘。'}function date(t){var d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
    function renderReview(){renderStats();E.weakList.innerHTML='';E.history.innerHTML='';if(!S.history.length){E.weakList.append(empty('完成一次模拟面试后，这里会生成薄弱点。'));E.history.append(empty('暂无练习记录。'));return}var bucket={};S.history.forEach(function(r){(r.details||[]).forEach(function(x){(bucket[x.label]||(bucket[x.label]=[])).push(x.score)})});Object.keys(bucket).map(function(label){var arr=bucket[label];return {label:label,score:Math.round(arr.reduce(function(a,b){return a+b},0)/arr.length)}}).sort(function(a,b){return a.score-b.score}).slice(0,5).forEach(function(x){var d=document.createElement('div');d.className='weak';var st=document.createElement('strong');st.textContent=x.label;var bar=document.createElement('div');bar.className='bar';var sp=document.createElement('span');sp.style.width=x.score+'%';bar.append(sp);var mt=document.createElement('div');mt.className='muted';mt.textContent=advice(x.label);d.append(st,bar,mt);E.weakList.append(d)});S.history.forEach(function(r){var d=document.createElement('article');d.className='item';var st=document.createElement('strong');st.textContent=r.question;var meta=document.createElement('div');meta.className='meta';var tg=document.createElement('span');tg.className='tag';tg.textContent=r.score+' 分';var dt=document.createElement('span');dt.textContent=date(r.createdAt);meta.append(tg,dt);var fb=document.createElement('div');fb.className='muted';fb.textContent=(r.feedback||[]).slice(0,2).join(' ');var b=document.createElement('button');b.className='ghost';b.textContent='再练一次';b.onclick=function(){switchView('interview');S.current={id:newId(),mode:r.mode||'project',level:'middle',text:r.question,createdAt:Date.now()};E.answer.value='';renderQ();renderFeedback()};d.append(st,meta,fb,b);E.history.append(d)})}function render(){renderStats();renderDocs();renderChat();renderQ();renderReview()}function switchView(v){document.querySelectorAll('.tab').forEach(function(b){b.classList.toggle('active',b.dataset.view===v)});document.querySelectorAll('.view').forEach(function(p){p.classList.toggle('active',p.id==='view-'+v)});E.title.textContent=page[v]||'面试助手';if(v==='review')renderReview()}
    document.querySelectorAll('.tab').forEach(function(b){b.onclick=function(){switchView(b.dataset.view)}});E.sampleBtn.onclick=function(){var set=new Set(S.docs.map(function(d){return d.title}));samples.forEach(function(s){if(!set.has(s.title))S.docs.push({id:newId(),title:s.title,tags:s.tags,text:s.text,createdAt:Date.now()})});rebuild();save();render();toast('示例资料已加入。')};E.addDoc.onclick=addDoc;E.fileInput.onchange=handleFiles;E.clearDocs.onclick=function(){if(S.docs.length&&confirm('确定清空所有资料吗？练习记录会保留。')){S.docs=[];rebuild();save();render();toast('资料已清空。')}};E.ask.onclick=ask;E.question.onkeydown=function(e){if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))ask()};E.start.onclick=start;E.next.onclick=start;E.submit.onclick=submit;E.copyBetter.onclick=function(){if(!S.lastBetter)return toast('提交回答后才会生成优化版。');navigator.clipboard.writeText(S.lastBetter).then(function(){toast('优化版已复制。')},function(){toast('复制失败，可以在反馈区手动选中。')})};E.clearHistory.onclick=function(){if(S.history.length&&confirm('确定清空练习记录吗？资料库会保留。')){S.history=[];save();render();toast('练习记录已清空。')}};load();rebuild();render();renderFeedback();
  </script>
